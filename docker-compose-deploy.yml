services:
  app:
    build:
      context: .
    restart: always
    volumes:
      - static-data:/vol/web/static
      - media-data:/vol/web/media
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
    depends_on:
      - db
    networks:
      - deploy

  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    networks:
      - deploy

  proxy:
    build:
      context: ./proxy
    restart: always
    depends_on:
      - app
    ports:
    #Host Port:Container Port
      - 80:8000
    volumes:
      - static-data:/vol/static
      - media-data:/vol/media
    networks:
      - deploy

networks:
  deploy:
    driver: bridge

volumes:
  static-data:
  media-data:
  postgres-data:
